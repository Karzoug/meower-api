syntax = "proto3";

package relation.v1;

option go_package = "relation/v1";

message FollowEvent {
    string source_user_id = 1;
    string target_user_id = 2;
}

message UnfollowEvent {
    string source_user_id = 1;
    string target_user_id = 2;
}

message MuteEvent {
    string source_user_id = 1;
    string target_user_id = 2;
}

message UnmuteEvent {
    string source_user_id = 1;
    string target_user_id = 2;
}