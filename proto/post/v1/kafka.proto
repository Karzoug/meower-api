syntax = "proto3";

package post.v1;

option go_package = "post/v1";

message PostCreatedEvent {
    // id is unique and sortable user identifier
    string id = 1;
    string author_id = 2;
}

message PostDeletedEvent {
    // id is unique and sortable user identifier
    string id = 1;
    string author_id = 2;
}